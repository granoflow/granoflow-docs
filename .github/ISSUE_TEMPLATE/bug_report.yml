name: Bug report / 錯誤回報
description: Report a reproducible problem / 回報可重現的問題
title: "[Bug] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues before submitting.
        提交前請先搜尋現有 issues，避免重複回報。
  - type: input
    id: user_nickname
    attributes:
      label: User nickname / 使用者暱稱
      description: Please do not change this nickname before the reward is issued. / 收到獎勵發放前請勿改名。
      placeholder: Your public nickname / 你的公開暱稱
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      description: Where did this issue occur? / 這個問題在哪個平台發生？
      options:
        - iOS
        - Android
        - macOS
        - Windows
        - Web
        - Documentation / 文件
        - Other / 其他
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: App/docs version where issue happened. / 發生問題的 App 或文件版本。
      placeholder: 0.1.8+13
    validations:
      required: true
  - type: input
    id: device_model_os_version
    attributes:
      label: Device brand, model, and OS version / 設備品牌、型號與作業系統版本
      description: Enter the device brand, model, and operating system version. / 請填寫設備品牌、型號與作業系統版本號。
      placeholder: Apple iPhone 15, iOS 18.1
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary / 摘要
      description: One sentence describing the problem. / 用一句話描述問題。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 重現步驟
      description: Provide clear, numbered steps. / 請提供清楚的編號步驟。
      placeholder: |
        1. Open ... / 開啟 ...
        2. Tap ... / 點選 ...
        3. Observe ... / 觀察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result / 預期結果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result / 實際結果
    validations:
      required: true
  - type: upload
    id: screenshots
    attributes:
      label: Screenshot / 截圖
      description: Upload at least one screenshot that shows the issue. / 請至少上傳一張能顯示問題的截圖。
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.gif,.webp"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence (optional) / 證據（選填）
      description: Screenshots, videos, logs, links. / 截圖、影片、日誌或連結。
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 檢查清單
      options:
        - label: I searched existing issues and did not find the same problem. / 我已搜尋現有 issues，沒有找到相同問題。
          required: true
        - label: I can reproduce this issue. / 我可以重現這個問題。
          required: true
