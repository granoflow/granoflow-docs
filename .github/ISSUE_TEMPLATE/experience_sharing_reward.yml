name: Experience sharing reward entry / 體驗分享獎勵申請
description: Submit an experience-sharing post for annual membership reward review / 提交體驗分享貼文以申請年費會員獎勵審核
title: "[Sharing] "
labels:
  - reward-entry
  - experience-sharing
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing your real Granoflow experience.
        感謝你分享真實的 Granoflow 使用體驗。

        Please submit one entry per original post, and make sure the post link remains publicly accessible for review.
        每篇原始貼文請提交一個申請，並確保貼文連結在審核期間可公開存取。

        We review the reward based on real experience and long-term intent. Help us and your readers understand what changed in your life, and why you genuinely want to keep using Granoflow for more than one year.
        我們會根據真實體驗與長期使用意願審核獎勵。請讓我們和讀者理解，你的生活有了什麼改變，以及為什麼你真的想持續使用 Granoflow 超過一年。
  - type: input
    id: post_link
    attributes:
      label: Original post link / 原始貼文連結
      description: Paste the direct public link to your experience-sharing post. / 請貼上體驗分享貼文的公開直連。
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: post_platform
    attributes:
      label: Publishing platform / 發布平台
      description: Where did you publish the post? / 你在哪個平台發布貼文？
      options:
        - X / Twitter
        - Threads
        - YouTube
        - Reddit
        - Facebook
        - Instagram
        - LinkedIn
        - TikTok
        - Public blog / website / 公開部落格或網站
        - Other publicly accessible platform / 其他可公開存取的平台
    validations:
      required: true
  - type: upload
    id: post_screenshot
    attributes:
      label: Original post screenshot / 原始貼文截圖
      description: Upload at least one screenshot of the original post for review backup. / 請至少上傳一張原始貼文截圖，作為審核備份。
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.gif,.webp"
  - type: textarea
    id: experience_or_helped_point
    attributes:
      label: Experience summary or where Granoflow helped / 體驗摘要或 Granoflow 幫到你的地方
      description: Briefly describe the real-life change shown in your post, the role Granoflow played, and why you want to keep using it. / 簡要描述貼文呈現的生活變化、Granoflow 扮演的角色，以及你為什麼想繼續使用。
      placeholder: |
        A strong entry usually reads like this / 好的申請通常像這樣：
        1. My life/work/practice changed in this specific way: ...
           我的生活、工作或練習有了這個具體改變：...
        2. Granoflow was not the whole story. It helped as a tool by: ...
           Granoflow 不是整篇分享的主角，它作為工具幫到我的地方是：...
        3. I want the annual membership because I can see myself using it for more than one year to: ...
           我想要年費會員，是因為我看得到自己接下來一年以上會用它來：...

        Writing guidance / 寫作建議：
        Focus on the change in your real life. Mention Granoflow naturally as one helper in that change. Avoid turning the post into an ad, a feature list, or a reward-only application.
        請把重點放在你真實生活中的改變。自然提到 Granoflow 如何輔助這個改變即可。請避免把貼文寫成廣告、功能清單，或只是為了領獎的申請。
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 檢查清單
      options:
        - label: I confirm this is my own real experience, not promotional copy. / 我確認這是我自己的真實體驗，不是宣傳文案。
          required: true
        - label: I genuinely want to keep using Granoflow for more than one year, and this entry explains that intent. / 我是真的想持續使用 Granoflow 超過一年，且這份申請已說明這個意願。
          required: true
        - label: The original post is publicly accessible or published on a mainstream social platform. / 原始貼文可公開存取，或發布於主流社群平台。
          required: true
        - label: I understand the post must remain accessible for at least 24 hours after publishing. / 我理解貼文發布後必須至少維持 24 小時可存取。
          required: true
        - label: I understand rewards are reviewed according to the published trial incentive rules. / 我理解獎勵會依公開的試用激勵規則審核。
          required: true
