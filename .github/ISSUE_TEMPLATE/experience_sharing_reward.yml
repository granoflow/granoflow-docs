name: Experience sharing reward entry / 體驗分享獎勵申請
description: Submit an experience-sharing post for annual membership reward review / 提交體驗分享貼文以申請年費會員獎勵審核
title: "[Sharing] "
labels:
  - reward-entry
  - experience-sharing
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for sharing your real Granoflow experience.
        感謝你分享真實的 Granoflow 使用體驗。

        Please submit one entry per original post, and make sure the post link remains publicly accessible for review.
        每篇原始貼文請提交一個申請，並確保貼文連結在審核期間可公開存取。

        We review the reward based on a real public post, a specific Granoflow point mentioned in that post, and your genuine current commitment to keep using Granoflow for more than one year.
        我們會根據真實公開貼文、貼文中提到的一個具體 Granoflow 亮點，以及你目前真實想持續使用 Granoflow 超過一年的承諾來審核獎勵。
  - type: markdown
    attributes:
      value: |
        ## Original post / 原始貼文
  - type: input
    id: post_link
    attributes:
      label: Original post link / 原始貼文連結
      description: Paste the direct public link to your experience-sharing post. / 請貼上體驗分享貼文的公開直連。
      placeholder: https://...
    validations:
      required: true
  - type: upload
    id: post_screenshot
    attributes:
      label: Original post screenshot / 原始貼文截圖
      description: Upload at least one screenshot of the original post for review backup. / 請至少上傳一張原始貼文截圖，作為審核備份。
    validations:
      required: true
      accept: ".png,.jpg,.jpeg,.gif,.webp"
  - type: dropdown
    id: post_platform
    attributes:
      label: Publishing platform / 發布平台
      description: Where did you publish the post? / 你在哪個平台發布貼文？
      options:
        - X / Twitter
        - Threads
        - YouTube
        - Reddit
        - Facebook
        - Instagram
        - LinkedIn
        - TikTok
        - Public blog / website / 公開部落格或網站
        - Other publicly accessible platform / 其他可公開存取的平台
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Granoflow point / Granoflow 亮點
  - type: textarea
    id: experience_or_helped_point
    attributes:
      label: What I appreciate most about Granoflow / 我最欣賞 Granoflow 的地方
      description: Briefly name the Granoflow quality, feeling, or specific role you appreciated most in this experience. / 請簡要說明這次體驗中，你最欣賞 Granoflow 的哪個特質、感受或具體作用。
      placeholder: |
        The thing I appreciate most about Granoflow is: ...
        我最欣賞和喜歡 Granoflow 的點是：...

        For example, in my camping post, the main story was the campsite, the weather, and the feeling of traveling alone. The Granoflow point I appreciated was that it helped me keep a light rhythm before and after the trip without turning the weekend into another stressful checklist.
        例如，在我的露營分享裡，主體是營地、天氣，以及一個人旅行的感受。我欣賞 Granoflow 的點是：它幫我在出發前後保留一點輕量節奏，但沒有把週末變成另一份壓力清單。
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Required confirmations / 必要確認
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 檢查清單
      options:
        - label: I confirm this is my own real experience, not promotional copy. / 我確認這是我自己的真實體驗，不是宣傳文案。
          required: true
        - label: The original post is publicly accessible or published on a mainstream social platform. / 原始貼文可公開存取，或發布於主流社群平台。
          required: true
        - label: I understand the post must remain accessible for at least 24 hours after publishing. / 我理解貼文發布後必須至少維持 24 小時可存取。
          required: true
        - label: I confirm my original sharing post already mentions the Granoflow point I wrote above. / 我確認我的原始分享文章中已經提到了上面填寫的 Granoflow 亮點。
          required: true
        - label: I understand this entry should describe a specific life moment where Granoflow played a helpful role, not claim that Granoflow changed my life. / 我理解這份申請應描述一個 Granoflow 起到幫助作用的具體生活片段，而不是宣稱 Granoflow 改變了我的人生。
          required: true
        - label: I confirm that wanting to keep using Granoflow for more than one year is my genuine current commitment, not just wording for this reward entry. / 我確認「想持續使用 Granoflow 超過一年」是我目前真實的承諾，而不只是為了這份獎勵申請寫出的說法。
          required: true
        - label: I understand rewards are reviewed according to the published trial incentive rules. / 我理解獎勵會依公開的試用激勵規則審核。
          required: true
