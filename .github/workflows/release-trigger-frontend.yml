name: Sync frontend on docs release
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then echo "CF_PAGES_DEPLOY_HOOK is empty"; exit 1; fi
          http_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST -d '' "$HOOK")
          echo "HTTP $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then exit 1; fi
