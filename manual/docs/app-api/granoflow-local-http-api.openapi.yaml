              schema:
                $ref: "#/components/schemas/CommandResult"
    patch:
      tags: [Resources]
      summary: Update task
      operationId: updateTask
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Resource command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
    delete:
