openapi: 3.1.0
info:
  title: Granoflow Local HTTP API
  version: 0.2.0
  summary: App-owned local HTTP API contract (English only)
  description: |
    English-only contract for the Granoflow App local HTTP API.

    Scope of this contract:
    - Endpoints that are currently implemented by the running App process.
    - Local loopback-first access model with optional user-managed network exposure.

    Out of scope:
    - Supabase Admin / RevenueCat Admin / arbitrary SQL / direct SQLCipher access.
    - Any endpoint not implemented in the local HTTP server runtime.

servers:
  - url: http://127.0.0.1:{port}
    description: Local loopback endpoint
    variables:
      port:
        default: "56789"
        description: Configurable local HTTP API port. Default is 56789.
security:
  - bearerAuth: []
tags:
  - name: Meta
  - name: Commands
  - name: Resources
paths:
  /:
    get:
      tags: [Meta]
      summary: Human-readable welcome page
      description: Public browser-friendly landing response with version and API documentation URL.
      operationId: getWelcome
      security: []
      responses:
        "200":
          description: Welcome text
          content:
            text/plain:
              schema:
                type: string
  /v1/health:
    get:
      tags: [Meta]
      summary: Health check
      description: Public health probe. No bearer token required.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Server reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/version:
    get:
      tags: [Meta]
      summary: Version metadata
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /v1/commands:
    post:
      tags: [Commands]
      summary: Execute command envelope
      operationId: postCommands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandEnvelope"
      responses:
        "200":
          description: Command response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "423":
          $ref: "#/components/responses/Error"
  /v1/tasks:
    get:
      tags: [Resources]
      summary: List tasks
      operationId: listTasks
      responses:
        "200":
          description: Resource command result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
    post:
      tags: [Resources]
      summary: Create task
      operationId: createTask
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Resource created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResult"
  /v1/tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      tags: [Resources]
      summary: Get task
      operationId: getTask
      responses:
        "200":
          description: Resource command result
          content:
