components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Token
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      required: [status, apiEnabled, running, version, serverTime]
      properties:
        status:
          type: string
          enum: [ok]
        apiEnabled:
          type: boolean
        running:
          type: boolean
        version:
          type: string
        releaseDate:
          type: [string, "null"]
        serverTime:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [version, buildNumber, channel, gitCommit]
      properties:
        version:
          type: string
        buildNumber:
          type: string
        releaseDate:
          type: [string, "null"]
        channel:
          type: string
        gitCommit:
          type: string
    CommandEnvelope:
      type: object
      additionalProperties: true
      description: |
        Forwarded to the App command handler as-is.
    CommandResult:
      type: object
      additionalProperties: true
      description: |
        App command result envelope.
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            detail:
              type: [string, "null"]
